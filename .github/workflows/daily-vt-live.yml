name: Daily VT live

# Promotes the daily-T nowcast to a committed feed for the tactical dashboard.
# Runs after US close on weekdays, recomputes daily V/T, and commits daily_vt.json.
# Does NOT touch production data.json (that's the monthly monitor's job).
on:
  schedule:
    - cron: "10 22 * * 1-5"     # 22:10 UTC (~6:10pm ET) Mon-Fri, after close
  workflow_dispatch:             # manual trigger too

permissions:
  contents: write

jobs:
  daily-vt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pandas numpy requests yfinance openpyxl lxml

      - name: Run daily-VT (DAILY_VT=1)
        env:
          DAILY_VT: "1"
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python fetch_and_build.py

      - name: Commit daily_vt.json if it changed
        run: |
          cp data_daily_vt.json daily_vt.json
          git config user.name  "fragility-bot"
          git config user.email "fragility-bot@users.noreply.github.com"
          git add daily_vt.json
          if git diff --cached --quiet; then
            echo "no change in daily_vt.json — skipping commit"
          else
            git commit -m "Update daily_vt.json $(date -u +%Y-%m-%d)"
            git push
          fi
