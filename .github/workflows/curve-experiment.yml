name: Curve experiment

# Manual only. Runs the fenced CURVE block, pulls yield-curve + household
# allocation data from FRED, and uploads curve_data.json as an artifact.
# Does NOT commit anything, so production data.json is never touched.
on:
  workflow_dispatch:

jobs:
  curve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pandas numpy requests yfinance openpyxl lxml

      - name: Run curve experiment (CURVE=1, no commit)
        env:
          CURVE: "1"
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python fetch_and_build.py

      - name: Upload result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: curve-result
          path: curve_data.json
          if-no-files-found: warn
